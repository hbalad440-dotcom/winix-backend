<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>🥇 الرابحين اليوم</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}

body{
  background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
  color:white;
  direction:rtl;
}

/* HEADER */
.header{
  text-align:center;
  padding:20px;
  background:#111;
  box-shadow:0 0 25px rgba(255,165,0,0.3);
}
.header h1{
  color:orange;
  text-shadow:0 0 10px orange;
}

/* WINNER TOP */
.topWinner{
  background:linear-gradient(45deg,gold,#ffcc00);
  color:black;
  padding:15px;
  margin:15px;
  border-radius:15px;
  text-align:center;
  font-weight:bold;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.05)}
  100%{transform:scale(1)}
}

/* LIST */
.container{padding:15px}

.user{
  background:rgba(255,255,255,0.05);
  padding:15px;
  margin:10px 0;
  border-radius:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition:0.3s;
}

.user:hover{
  transform:scale(1.03);
  box-shadow:0 0 25px orange;
}

/* TOP 3 */
.top1{border:2px solid gold}
.top2{border:2px solid silver}
.top3{border:2px solid #cd7f32}

/* INFO */
.name{font-size:16px}
.earn{color:#00ffcc;font-size:14px}
.balance{color:#aaa;font-size:12px}

.rank{font-size:20px;font-weight:bold}

/* PROGRESS */
.bar{
  height:6px;
  background:#333;
  border-radius:10px;
  margin-top:5px;
}
.fill{
  height:6px;
  background:orange;
  border-radius:10px;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  display:flex;
  justify-content:space-around;
  padding:10px;
}

.nav a{
  color:#aaa;
  text-decoration:none;
}

.nav a:hover{color:orange}

</style>
</head>

<body>

<div class="header">
  <h1>🥇 الرابحين اليوم</h1>
</div>

<div id="topWinner"></div>

<div class="container" id="list">
⏳ جاري التحميل...
</div>

<div class="nav">
  <a href="dashboard.html">🏠</a>
  <a href="vip.html">🏆</a>
  <a href="agents.html">👑</a>
  <a href="profile.html">👤</a>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSy...",
  projectId:"winix-f2660"
});

const db = getFirestore(app);

async function load(){

  let snap = await getDocs(collection(db,"users"));

  let users=[];

  snap.forEach(doc=>{
    let d = doc.data();
    d.todayEarn = d.todayEarn || 0;
    users.push(d);
  });

  users.sort((a,b)=> b.todayEarn - a.todayEarn);

  let max = users[0]?.todayEarn || 1;

  // 👑 الفائز الأول
  if(users.length){
    document.getElementById("topWinner").innerHTML = `
      <div class="topWinner">
        👑 المتصدر اليوم: ${users[0].username} - ${users[0].todayEarn} ل.س 🔥
      </div>
    `;
  }

  let html="";

  users.slice(0,10).forEach((u,i)=>{

    let cls="user";
    let medal="";

    if(i==0){cls+=" top1"; medal="👑"}
    else if(i==1){cls+=" top2"; medal="🥈"}
    else if(i==2){cls+=" top3"; medal="🥉"}

    let percent = (u.todayEarn / max) * 100;

    html+=`
    <div class="${cls}">
      <div>
        <div class="name">${medal} ${u.username}</div>
        <div class="earn">💰 ${u.todayEarn} ل.س</div>
        <div class="balance">📊 رصيد: ${u.balance} ل.س</div>

        <div class="bar">
          <div class="fill" style="width:${percent}%"></div>
        </div>

      </div>
      <div class="rank">#${i+1}</div>
    </div>
    `;
  });

  document.getElementById("list").innerHTML=html;
}

load();

</script>

</body>
</html>
