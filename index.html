<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="utf-8">
  <title>Winix</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- خط احترافي -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Cairo', sans-serif;
    }

    body {
      background: #0f0f0f;
      color: white;
      text-align: center;
      direction: rtl;
    }

    header {
      padding: 20px;
      background: #111;
      border-bottom: 1px solid #222;
    }

    h1 {
      color: orange;
      margin-bottom: 10px;
    }

    .container {
      padding: 80px 20px;
    }

    p {
      color: #aaa;
      margin-bottom: 20px;
      font-size: 18px;
    }

    .btn {
      display: inline-block;
      padding: 12px 25px;
      background: orange;
      color: black;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ff9900;
      transform: scale(1.05);
    }

    .links {
      margin-top: 30px;
    }

    .links a {
      color: white;
      text-decoration: none;
      margin: 0 10px;
      transition: 0.3s;
    }

    .links a:hover {
      color: orange;
    }

    footer {
      margin-top: 60px;
      padding: 20px;
      border-top: 1px solid #222;
      color: #777;
    }
  </style>
</head>

<body>

<header>
  <h1>🔥 Winix</h1>
</header>

<div class="container">
  <h2>اربح بسهولة 💰</h2>
  <p>منصة بسيطة لتحقيق دخل من الإنترنت</p>

  <!-- زر تسجيل -->
  <a href="login.html" class="btn">ابدأ الآن</a>

  <div class="links">
    <a href="services.html">الخدمات</a>
    <a href="#">تواصل</a>
  </div>
</div>

<footer>
  © 2026 Winix
</footer>

</body>
</html>
