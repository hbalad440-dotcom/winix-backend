<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Winix</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- خط احترافي -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Cairo', sans-serif;
    }

    body {
      background: #0f0f0f;
      color: white;
      direction: rtl;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 20px;
      background: #111;
      border-bottom: 1px solid #222;
      align-items: center;
    }

    header h1 {
      color: orange;
      font-weight: 700;
    }

    nav a {
      margin-left: 20px;
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    nav a:hover {
      color: orange;
    }

    .hero {
      text-align: center;
      padding: 100px 20px;
    }

    .hero h2 {
      font-size: 42px;
      margin-bottom: 15px;
      font-weight: 700;
    }

    .hero p {
      color: #aaa;
      margin-bottom: 25px;
      font-size: 18px;
    }

    .btn {
      padding: 12px 25px;
      background: orange;
      color: black;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ff9900;
      transform: scale(1.05);
    }

    .services {
      display: flex;
      justify-content: center;
      gap: 25px;
      padding: 60px 20px;
      flex-wrap: wrap;
    }

    .card {
      background: #1a1a1a;
      padding: 25px;
      border-radius: 15px;
      width: 260px;
      text-align: center;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-8px);
      background: #222;
    }

    .card h3 {
      margin-bottom: 10px;
      color: orange;
      font-size: 20px;
    }

    footer {
      text-align: center;
      padding: 20px;
      border-top: 1px solid #222;
      margin-top: 30px;
      color: #777;
    }
  </style>
</head>

<body>

<header>
  <h1>🔥 Winix</h1>
  <nav>
    <a href="#">الرئيسية</a>
    <a href="#">الخدمات</a>
    <a href="#">تواصل</a>
  </nav>
</header>

<section class="hero">
  <h2>اربح بسهولة مع Winix 💰</h2>
  <p>منصة بسيطة لتحقيق دخل من الإنترنت</p>
  <button class="btn">ابدأ الآن</button>
</section>

<section class="services">
  <div class="card">
    <h3>💸 أرباح يومية</h3>
    <p>احصل على دخل يومي بسهولة</p>
  </div>

  <div class="card">
    <h3>📈 استثمار</h3>
    <p>نظام استثمار بسيط وآمن</p>
  </div>

  <div class="card">
    <h3>🤝 دعوة أصدقاء</h3>
    <p>اربح من خلال دعوة الآخرين</p>
  </div>
</section>

<footer>
  © 2026 Winix - جميع الحقوق محفوظة
</footer>

</body>
</html>
