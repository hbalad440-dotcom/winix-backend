<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>👑 وكلاء الشحن</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}

body{
  background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
  color:white;
  direction:rtl;
}

/* HEADER */
.header{
  text-align:center;
  padding:20px;
  background:#111;
  box-shadow:0 0 20px rgba(255,165,0,0.2);
}

.header h1{
  color:orange;
}

/* CARD */
.container{
  padding:20px;
}

.agent{
  background:rgba(255,255,255,0.05);
  padding:15px;
  margin:10px 0;
  border-radius:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 0 15px rgba(255,165,0,0.2);
  transition:0.3s;
}

.agent:hover{
  transform:scale(1.02);
  box-shadow:0 0 25px orange;
}

/* INFO */
.name{
  font-size:16px;
}

.verify{
  color:#00aaff;
  font-size:14px;
}

.phone{
  font-size:13px;
  color:#aaa;
}

.rank{
  font-size:18px;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  display:flex;
  justify-content:space-around;
  padding:10px;
}

.nav a{
  color:#aaa;
  text-decoration:none;
}

.nav a:hover{color:orange}

</style>
</head>

<body>

<div class="header">
  <h1>👑 وكلاء الشحن</h1>
</div>

<div class="container" id="list">
⏳ جاري التحميل...
</div>

<div class="nav">
  <a href="dashboard.html">🏠</a>
  <a href="vip.html">🏆</a>
  <a href="profile.html">👤</a>
  <a href="contact.html">📞</a>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSy...",
  projectId:"winix-f2660"
});

const db = getFirestore(app);

async function load(){

  let snap = await getDocs(collection(db,"users"));

  let html="";

  snap.forEach(doc=>{
    let u = doc.data();

    if(u.agent){

      html += `
      <div class="agent">
        <div>
          <div class="name">👤 ${u.username}</div>
          <div class="verify">🔵 وكيل موثّق</div>
          <div class="phone">📞 ${u.phone || "غير متوفر"}</div>
        </div>
        <div class="rank">💼</div>
      </div>
      `;
    }
  });

  document.getElementById("list").innerHTML = html || "❌ لا يوجد وكلاء حالياً";
}

load();

</script>

</body>
</html>
