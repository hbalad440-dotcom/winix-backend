<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>👑 VIP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}

body{
  background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
  color:white;
  direction:rtl;
}

.header{
  text-align:center;
  padding:20px;
  background:#111;
}
.header h1{color:orange}

/* CARD */
.vipCard{
  margin:20px;
  padding:20px;
  border-radius:20px;
  background:linear-gradient(45deg,#222,#111);
  text-align:center;
  box-shadow:0 0 25px rgba(255,165,0,0.3);
}

/* PROGRESS */
.bar{
  background:#333;
  height:8px;
  border-radius:10px;
  margin-top:10px;
}
.fill{
  height:8px;
  background:orange;
  border-radius:10px;
}

/* BUTTON */
.btn{
  margin-top:15px;
  padding:12px;
  background:orange;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* TOP VIP */
.top{
  background:gold;
  color:black;
  padding:10px;
  margin:15px;
  border-radius:10px;
  text-align:center;
  font-weight:bold;
}

.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  display:flex;
  justify-content:space-around;
  padding:10px;
}

</style>
</head>

<body>

<div class="header">
  <h1>👑 نظام VIP</h1>
</div>

<div id="topVip"></div>

<div class="vipCard">
  <h2 id="level">VIP 0</h2>
  <p id="info"></p>

  <div class="bar">
    <div class="fill" id="progress"></div>
  </div>

  <button class="btn" onclick="getBonus()">🎁 بونص VIP</button>
</div>

<div class="nav">
  <a href="dashboard.html">🏠</a>
  <a href="winners.html">🥇</a>
  <a href="agents.html">👑</a>
  <a href="profile.html">👤</a>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc, collection, getDocs } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSy...",
  projectId:"winix-f2660"
});

const db = getFirestore(app);

let user = localStorage.getItem("user");

// 🧠 VIP
function getVIP(refs){
  if(refs>=20) return 3;
  if(refs>=10) return 2;
  if(refs>=5) return 1;
  return 0;
}

// LOAD
async function load(){

  let ref = doc(db,"users",user);
  let snap = await getDoc(ref);
  let d = snap.data();

  let vip = getVIP(d.refs);

  let next = (vip+1)*5;
  let need = next - d.refs;

  document.getElementById("level").innerText = "👑 VIP " + vip;
  document.getElementById("info").innerText =
    vip<3 ? "باقي "+need+" إحالة للترقية 🚀" : "🔥 أعلى مستوى";

  let percent = (d.refs / next) * 100;
  document.getElementById("progress").style.width = percent+"%";

}

// 🎁 BONUS
window.getBonus = async ()=>{

  let ref = doc(db,"users",user);
  let snap = await getDoc(ref);
  let d = snap.data();

  let vip = getVIP(d.refs);

  let bonus = vip * 50;

  if(bonus === 0){
    alert("❌ لازم تكون VIP");
    return;
  }

  await updateDoc(ref,{
    balance: d.balance + bonus
  });

  alert("🎁 حصلت على "+bonus+" ل.س");
}

load();

// 👑 أفضل VIP
async function topVip(){

  let snap = await getDocs(collection(db,"users"));

  let best = null;

  snap.forEach(doc=>{
    let d = doc.data();
    if(!best || d.refs > best.refs){
      best = d;
    }
  });

  if(best){
    document.getElementById("topVip").innerHTML =
      `<div class="top">👑 أفضل VIP: ${best.username} (${best.refs} إحالة)</div>`;
  }
}

topVip();

</script>

</body>
</html>
