<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>إنشاء حساب - Winix</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Cairo', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      direction: rtl;
    }

    .box {
      background: #1a1a1a;
      padding: 35px;
      border-radius: 20px;
      width: 320px;
      text-align: center;
      box-shadow: 0 0 25px rgba(255,165,0,0.25);
    }

    h2 { color: orange; margin-bottom: 20px; }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      background: #222;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      background: orange;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    #toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: orange;
      color: black;
      padding: 12px 20px;
      border-radius: 10px;
      display: none;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>📝 إنشاء حساب</h2>

  <input type="text" id="username" placeholder="اسم المستخدم">
  <input type="email" id="email" placeholder="البريد الإلكتروني">
  <input type="password" id="password" placeholder="كلمة المرور">

  <button onclick="register()">إنشاء حساب</button>

  <a href="login.html">لديك حساب؟ تسجيل الدخول</a>
</div>

<div id="toast"></div>

<!-- 🔥 Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBChYq1GZKU7RQ2rTN_gShncYhBukVPitw",
  authDomain: "winix-f2660.firebaseapp.com",
  projectId: "winix-f2660",
  storageBucket: "winix-f2660.firebasestorage.app",
  messagingSenderId: "467492949746",
  appId: "1:467492949746:web:4a0b7adfd5373df1e38a6b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// إشعار
function showToast(msg){
  let t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(()=> t.style.display="none",2000);
}

// جلب الإحالة
let params = new URLSearchParams(window.location.search);
let ref = params.get("ref");

// تسجيل
window.register = async function () {

  let username = document.getElementById("username").value.trim();
  let email = document.getElementById("email").value.trim();
  let password = document.getElementById("password").value.trim();

  if(!username || !email || !password){
    showToast("⚠️ عبّي كل الحقول");
    return;
  }

  let userRef = doc(db, "users", username);
  let userSnap = await getDoc(userRef);

  // ❌ تحقق من وجود المستخدم
  if(userSnap.exists()){
    showToast("❌ اسم المستخدم موجود");
    return;
  }

  // ✅ إنشاء المستخدم
  await setDoc(userRef, {
    username,
    email,
    password,
    balance: 0,
    refs: 0
  });

  // 👥 نظام الإحالة
  if(ref){
    let refRef = doc(db, "users", ref);
    let refSnap = await getDoc(refRef);

    if(refSnap.exists()){
      let data = refSnap.data();

      await updateDoc(refRef, {
        refs: data.refs + 1,
        balance: data.balance + 5
      });

      showToast("🎁 سجلت عن طريق دعوة!");
    }
  }

  localStorage.setItem("user", username);

  showToast("✅ تم إنشاء الحساب");

  setTimeout(()=>{
    window.location.href = "dashboard.html";
  },1000);
}
</script>

</body>
</html>
