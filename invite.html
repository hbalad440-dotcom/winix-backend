<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>دعوة الأصدقاء</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo&display=swap" rel="stylesheet">

<style>
body{
  background:#0f0f0f;
  color:white;
  font-family:Cairo;
  text-align:center;
}
.box{
  background:#1a1a1a;
  padding:30px;
  margin:80px auto;
  width:320px;
  border-radius:20px;
}
.btn{
  background:orange;
  padding:10px;
  border:none;
  border-radius:10px;
  margin-top:10px;
}
.link{
  background:#222;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="box">
<h2>👥 دعوة الأصدقاء</h2>

<div class="link" id="link"></div>

<button class="btn" onclick="copy()">📋 نسخ الرابط</button>

<br><br>
<a href="dashboard.html">🔙 رجوع</a>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

const firebaseConfig = {
  apiKey: "AIzaSyBChYq1GZKU7RQ2rTN_gShncYhBukVPitw",
  authDomain: "winix-f2660.firebaseapp.com",
  projectId: "winix-f2660"
};

initializeApp(firebaseConfig);

let user = localStorage.getItem("user");

if(!user){
  window.location.href="login.html";
}

// 🔥 رابط الإحالة
let link = window.location.origin + "/register.html?ref=" + user;

document.getElementById("link").innerText = link;

window.copy = function(){
  navigator.clipboard.writeText(link);
  alert("تم النسخ");
}
</script>

</body>
</html>
