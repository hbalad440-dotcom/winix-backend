<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>🏆 الترتيب</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{background:#0f0f0f;color:white;font-family:Cairo;text-align:center}
.user{
  background:#1a1a1a;
  margin:10px;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<h2>🏆 أفضل اللاعبين</h2>

<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSy...",
  projectId:"winix-f2660"
});

const db = getFirestore(app);

async function load(){
  let snap = await getDocs(collection(db,"users"));

  let users = [];

  snap.forEach(doc=>{
    users.push(doc.data());
  });

  // ترتيب حسب الرصيد
  users.sort((a,b)=>b.balance - a.balance);

  let box = document.getElementById("list");

  users.slice(0,10).forEach((u,i)=>{
    box.innerHTML += `
    <div class="user">
      🥇 #${i+1} - ${u.username} | 💰 ${u.balance}
    </div>`;
  });
}

load();

</script>

</body>
</html>
