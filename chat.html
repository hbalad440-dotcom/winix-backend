<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>💬 الشات العالمي</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}

body{
  background:#0f0f0f;
  color:white;
  direction:rtl;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* HEADER */
.header{
  padding:15px;
  background:#111;
  text-align:center;
  color:orange;
}

/* CHAT BOX */
.chat{
  flex:1;
  overflow-y:auto;
  padding:15px;
}

/* MESSAGE */
.msg{
  background:#1a1a1a;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.name{
  font-size:13px;
  color:orange;
}

.text{
  margin-top:5px;
}

/* INPUT */
.inputBox{
  display:flex;
  padding:10px;
  background:#111;
}

input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#222;
  color:white;
}

button{
  margin-right:10px;
  padding:10px;
  background:orange;
  border:none;
  border-radius:10px;
}

/* BADGES */
.vip{color:gold;font-size:12px}
.agent{color:#00aaff;font-size:12px}

</style>
</head>

<body>

<div class="header">💬 الشات العالمي</div>

<div class="chat" id="chat"></div>

<div class="inputBox">
  <button onclick="send()">إرسال</button>
  <input id="msg" placeholder="اكتب رسالة...">
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSy...",
  projectId:"winix-f2660"
});

const db = getFirestore(app);

let user = localStorage.getItem("user");

if(!user){
  window.location.href="login.html";
}

// 🧠 VIP
function getVIP(refs){
  if(refs>=20) return 3;
  if(refs>=10) return 2;
  if(refs>=5) return 1;
  return 0;
}

// إرسال
window.send = async ()=>{

  let text = document.getElementById("msg").value.trim();

  if(text === "") return;

  await addDoc(collection(db,"chat"),{
    user:user,
    text:text,
    time:Date.now()
  });

  document.getElementById("msg").value="";
}

// عرض مباشر
let q = query(collection(db,"chat"), orderBy("time"));

onSnapshot(q,(snap)=>{

  let html="";

  snap.forEach(doc=>{

    let d = doc.data();

    html += `
      <div class="msg">
        <div class="name">👤 ${d.user}</div>
        <div class="text">${d.text}</div>
      </div>
    `;
  });

  let chat = document.getElementById("chat");
  chat.innerHTML = html;

  chat.scrollTop = chat.scrollHeight;

});

</script>

</body>
</html>
