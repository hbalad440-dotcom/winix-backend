<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>حسابي - Winix</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Cairo', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
      color: white;
      direction: rtl;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #1a1a1a;
      padding: 35px;
      border-radius: 20px;
      width: 320px;
      text-align: center;
      box-shadow: 0 0 25px rgba(255,165,0,0.25);
      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    h2 {
      color: orange;
      margin-bottom: 20px;
    }

    .info {
      background: #222;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
      background: #222;
      color: white;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      background: orange;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #ff9900;
    }

    .back {
      display: block;
      margin-top: 15px;
      color: #aaa;
      text-decoration: none;
    }

    #toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: orange;
      color: black;
      padding: 12px 20px;
      border-radius: 10px;
      display: none;
      font-weight: bold;
    }

  </style>
</head>

<body>

<div class="box">
  <h2>👤 حسابي</h2>

  <div class="info">👤 الاسم: <span id="username"></span></div>
  <div class="info">📧 الإيميل: <span id="email"></span></div>

  <input type="text" id="newName" placeholder="تغيير الاسم">
  <input type="email" id="newEmail" placeholder="تغيير الإيميل">

  <button onclick="updateProfile()">💾 حفظ التعديلات</button>

  <a href="dashboard.html" class="back">🔙 رجوع</a>
</div>

<div id="toast"></div>

<script>

// إشعار
function showToast(msg){
  let t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(()=> t.style.display="none",2000);
}

// تحقق المستخدم
let currentUser = localStorage.getItem("user");

if(!currentUser){
  window.location.href = "login.html";
}

// جلب المستخدمين
let users = JSON.parse(localStorage.getItem("users")) || [];

// المستخدم الحالي
let userData = users.find(u => u.username === currentUser);

if(!userData){
  window.location.href = "login.html";
}

// عرض البيانات
document.getElementById("username").innerText = userData.username;
document.getElementById("email").innerText = userData.email;

// تحديث
function updateProfile(){
  let newName = document.getElementById("newName").value.trim();
  let newEmail = document.getElementById("newEmail").value.trim();

  if(newName === "" && newEmail === ""){
    showToast("⚠️ ما غيرت شي");
    return;
  }

  // ❗ منع تكرار الاسم
  if(newName !== "" && users.find(u => u.username === newName)){
    showToast("❌ الاسم مستخدم");
    return;
  }

  // تحديث الاسم
  if(newName !== ""){
    userData.username = newName;
    localStorage.setItem("user", newName);
  }

  // تحديث الإيميل
  if(newEmail !== ""){
    userData.email = newEmail;
  }

  // حفظ
  localStorage.setItem("users", JSON.stringify(users));

  showToast("✅ تم التحديث");

  setTimeout(()=>location.reload(),1000);
}

</script>

</body>
</html>
